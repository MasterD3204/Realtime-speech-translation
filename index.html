<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realtime Conference Interpreter</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html {
  height: 100%;
}

body {
  height: 100vh;
  overflow: hidden;
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #0a0d14;
  color: #e2e8f0;
  display: flex;
  flex-direction: column;
}

/* ── Header ─────────────────────────────────────────────── */
header {
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #1e2330;
  background: #0f1117;
  flex-shrink: 0;
}

.logo { font-size: 1rem; font-weight: 700; color: #f8fafc; letter-spacing: -0.02em; }
.logo span { color: #6366f1; }

.controls {
  display: flex;
  align-items: center;
  gap: 10px;
}

input[type="text"] {
  background: #1e2330;
  border: 1px solid #2d3448;
  border-radius: 7px;
  padding: 7px 12px;
  color: #e2e8f0;
  font-size: 0.82rem;
  width: 200px;
  outline: none;
  transition: border-color 0.2s;
}
input[type="text"]:focus { border-color: #6366f1; }

.btn {
  padding: 7px 14px;
  border-radius: 7px;
  border: none;
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn-connect  { background: #6366f1; color: #fff; }
.btn-connect:hover { background: #4f46e5; }
.btn-connect:disabled { background: #2d3448; color: #64748b; cursor: not-allowed; }
.btn-disc     { background: #374151; color: #9ca3af; }
.btn-disc:hover { background: #4b5563; }
.btn-disc:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-start    { background: #166534; color: #86efac; }
.btn-start:hover { background: #15803d; }
.btn-start:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-stop     { background: #7f1d1d; color: #fca5a5; }
.btn-stop:hover { background: #991b1b; }
.btn-stop:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-reset    { background: #1e2330; border: 1px solid #2d3448; color: #64748b; }
.btn-reset:hover { background: #2d3448; color: #94a3b8; }

.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #374151; flex-shrink: 0;
  transition: background 0.3s;
}
.status-dot.connected { background: #22c55e; box-shadow: 0 0 5px #22c55e88; }
.status-dot.listening { background: #6366f1; box-shadow: 0 0 5px #6366f188;
  animation: blink 1.2s ease-in-out infinite; }
.status-dot.error     { background: #ef4444; }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

.status-label { font-size: 0.78rem; color: #64748b; }

/* ── VAD Config Panel ────────────────────────────────────── */
.vad-panel {
  padding: 8px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  background: #0c0e14;
  border-bottom: 1px solid #1e2330;
  flex-shrink: 0;
  flex-wrap: wrap;
}
.vad-panel label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.75rem;
  color: #64748b;
}
.vad-panel input[type="number"] {
  background: #1e2330;
  border: 1px solid #2d3448;
  border-radius: 6px;
  padding: 4px 8px;
  color: #e2e8f0;
  font-size: 0.78rem;
  width: 72px;
  outline: none;
}
.vad-panel input[type="number"]:focus { border-color: #6366f1; }

/* ── Visualizer ──────────────────────────────────────────── */
.viz-bar {
  height: 36px;
  background: #0f1117;
  border-bottom: 1px solid #1e2330;
  padding: 4px 24px;
  flex-shrink: 0;
  /* FIX 2: position relative so canvas can size against it */
  position: relative;
}
/* FIX 2: canvas fills the viz-bar via CSS, not JS offsetWidth */
canvas {
  display: block;
  width: 100%;
  height: 28px;
}

/* ── Split pane ──────────────────────────────────────────── */
.panes {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  /* FIX 1: min-height: 0 needed so grid children can shrink below content size */
  min-height: 0;
  overflow: hidden;
}

.pane {
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
}

.pane:first-child { border-right: 2px solid #1e2330; }

.pane-header {
  padding: 12px 20px;
  background: #0f1117;
  border-bottom: 1px solid #1e2330;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.lang-badge {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 4px;
}
.lang-vi { background: #1e3a5f; color: #60a5fa; }
.lang-en { background: #14532d; color: #4ade80; }

.pane-title { font-size: 0.8rem; color: #64748b; }

.pane-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  min-height: 0;
}

/* ── Transcript content ──────────────────────────────────── */
.segment {
  margin-bottom: 16px;
  animation: fadeUp 0.25s ease;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

.segment-text {
  font-size: 1.05rem;
  line-height: 1.65;
  color: #e2e8f0;
}

.segment.frozen .segment-text { color: #cbd5e1; }

.segment.pending .segment-text {
  color: #94a3b8;
  font-style: italic;
}
.segment.pending .segment-text::after {
  content: ' ▊';
  color: #6366f1;
  animation: blink 0.8s step-end infinite;
}

.en-pending {
  color: #475569;
  font-style: italic;
  font-size: 0.9rem;
  display: flex;
  align-items: center;
  gap: 6px;
}
.spinner {
  width: 10px; height: 10px;
  border: 2px solid #475569;
  border-top-color: #6366f1;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

.empty-hint {
  color: #374151;
  font-size: 0.9rem;
  text-align: center;
  margin-top: 60px;
}

/* ── Footer stats ────────────────────────────────────────── */
footer {
  padding: 8px 24px;
  background: #0f1117;
  border-top: 1px solid #1e2330;
  display: flex;
  gap: 20px;
  font-size: 0.72rem;
  color: #475569;
  flex-shrink: 0;
}
.stat span { color: #64748b; }
</style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="logo">🎙 <span>Interpreter</span></div>
    <div class="status-dot" id="dot"></div>
    <div class="status-label" id="status-label">Chưa kết nối</div>
  </div>

  <div class="controls">
    <input type="text" id="ws-url" value="" placeholder="ws://IP:PORT">
    <button class="btn btn-connect"  id="btn-conn">Kết nối</button>
    <button class="btn btn-disc"     id="btn-disc"  disabled>Ngắt</button>
    <button class="btn btn-start"    id="btn-start" disabled>▶ Ghi</button>
    <button class="btn btn-stop"     id="btn-stop"  disabled>■ Dừng</button>
    <button class="btn btn-reset"    id="btn-reset">↺ Reset</button>
  </div>
</header>

<!-- ── VAD Config Panel ── -->
<div class="vad-panel">
  <label>Threshold
    <input type="number" id="vad-threshold" value="0.5" min="0" max="1" step="0.05">
  </label>
  <label>Min silence (ms)
    <input type="number" id="vad-min-silence" value="400" min="0" step="20">
  </label>
  <label>Min speech (ms)
    <input type="number" id="vad-min-speech" value="200" min="0" step="20">
  </label>
  <button class="btn btn-reset" id="btn-vad-apply">Áp dụng VAD</button>
</div>

<!-- ── Visualizer ── -->
<div class="viz-bar">
  <canvas id="canvas"></canvas>
</div>

<!-- ── Split pane ── -->
<div class="panes">
  <!-- VI pane -->
  <div class="pane">
    <div class="pane-header">
      <span class="lang-badge lang-vi">VI</span>
      <span class="pane-title">Transcript — Tiếng Việt</span>
    </div>
    <div class="pane-body" id="vi-body">
      <div class="empty-hint">Bắt đầu ghi để thấy transcript…</div>
    </div>
  </div>

  <!-- EN pane -->
  <div class="pane">
    <div class="pane-header">
      <span class="lang-badge lang-en">EN</span>
      <span class="pane-title">Translation — English</span>
    </div>
    <div class="pane-body" id="en-body">
      <div class="empty-hint">Bản dịch sẽ xuất hiện ở đây…</div>
    </div>
  </div>
</div>

<!-- ── Footer ── -->
<footer>
  <div class="stat">Segments dịch: <span id="stat-segs">0</span></div>
  <div class="stat">ASR chunks: <span id="stat-chunks">0</span></div>
  <div class="stat">WAIT count: <span id="stat-waits">0</span></div>
</footer>

<script>
// ── Auto-fill WS URL based on current host ────────────────────────────────
(function () {
  const input = document.getElementById("ws-url");
  const rawHost = location.hostname || "127.0.0.1";
  const host = rawHost === "0.0.0.0" ? "127.0.0.1" : rawHost;
  input.value = `ws://${host}:6006`;
})();

// ── State ─────────────────────────────────────────────────────────────────
let ws = null;
let audioCtx, workletNode, sourceNode, analyserNode, micStream, animId;

const TARGET_SR = 16000;

let statSegs = 0, statChunks = 0, statWaits = 0;
// VI pane: append-only — mỗi asr_partial event mang phần text MỚI (diff), không
// phải toàn bộ transcript. Nối trực tiếp vào node text hiện có, không rebuild.
let viNode = null;
// EN pane: mỗi translation event mang 1 segment đã frozen — nối vào CÙNG một
// node đoạn văn (giống VI pane) để hiển thị liền mạch, không phải 1 khối/dòng
// riêng cho mỗi câu.
let enNode = null;

// ── DOM ───────────────────────────────────────────────────────────────────
const dot        = document.getElementById("dot");
const statusLbl  = document.getElementById("status-label");
const wsUrlInput = document.getElementById("ws-url");
const btnConn    = document.getElementById("btn-conn");
const btnDisc    = document.getElementById("btn-disc");
const btnStart   = document.getElementById("btn-start");
const btnStop    = document.getElementById("btn-stop");
const btnReset   = document.getElementById("btn-reset");
const viBody     = document.getElementById("vi-body");
const enBody     = document.getElementById("en-body");
const canvas     = document.getElementById("canvas");
const ctx2d      = canvas.getContext("2d");
const vadThreshold  = document.getElementById("vad-threshold");
const vadMinSilence = document.getElementById("vad-min-silence");
const vadMinSpeech  = document.getElementById("vad-min-speech");
const btnVadApply   = document.getElementById("btn-vad-apply");

// ── UI helpers ────────────────────────────────────────────────────────────
function setStatus(state, text) {
  dot.className = "status-dot " + state;
  statusLbl.textContent = text;
}

function setUI(connected, recording) {
  btnConn.disabled  = connected;
  btnDisc.disabled  = !connected;
  btnStart.disabled = !connected || recording;
  btnStop.disabled  = !recording;
}

function updateStats() {
  document.getElementById("stat-segs").textContent   = statSegs;
  document.getElementById("stat-chunks").textContent = statChunks;
  document.getElementById("stat-waits").textContent  = statWaits;
}

function clearHint(el) {
  const hint = el.querySelector(".empty-hint");
  if (hint) hint.remove();
}

function scrollBoth() {
  viBody.scrollTop = viBody.scrollHeight;
  enBody.scrollTop = enBody.scrollHeight;
}

// ── VI pane — append-only, chỉ nhận phần text mới từ asr_partial ───────────
function ensureViNode() {
  if (viNode) return viNode;
  clearHint(viBody);
  const segment = document.createElement("div");
  segment.className = "segment pending";
  const textEl = document.createElement("div");
  textEl.className = "segment-text";
  segment.appendChild(textEl);
  viBody.appendChild(segment);
  viNode = textEl;
  return viNode;
}

function appendViText(newText) {
  if (!newText) return;
  const el = ensureViNode();
  el.textContent = el.textContent ? `${el.textContent} ${newText}` : newText;
  scrollBoth();
}

// ── EN pane — append-only, mỗi translation event nối vào cùng 1 đoạn văn ───
function ensureEnNode() {
  if (enNode) return enNode;
  clearHint(enBody);
  const segment = document.createElement("div");
  segment.className = "segment frozen";
  const textEl = document.createElement("div");
  textEl.className = "segment-text";
  segment.appendChild(textEl);
  enBody.appendChild(segment);
  enNode = textEl;
  return enNode;
}

function appendEnSegment(text) {
  if (!text) return;
  const el = ensureEnNode();
  el.textContent = el.textContent ? `${el.textContent} ${text}` : text;
  scrollBoth();
}

function escHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── WebSocket ─────────────────────────────────────────────────────────────
function connect() {
  const url = wsUrlInput.value.trim();
  if (!url) return;
  setStatus("", "Đang kết nối…");
  ws = new WebSocket(url);
  ws.binaryType = "arraybuffer";

  ws.onopen = () => {
    setStatus("connected", "Đã kết nối · " + url);
    setUI(true, false);
  };

  ws.onmessage = ({ data }) => {
    let msg;
    try { msg = JSON.parse(data); } catch { return; }

    if (msg.type === "asr_partial") {
      statChunks++;
      appendViText(msg.text || "");
      updateStats();
    } else if (msg.type === "translation") {
      statSegs++;
      appendEnSegment(msg.text || "");
      updateStats();
    } else if (msg.type === "wait") {
      statWaits++;
      updateStats();
    } else if (msg.type === "error") {
      setStatus("error", `Lỗi [${msg.code}]: ${msg.message}`);
    } else if (msg.type === "reset_ack") {
      viNode = null;
      enNode = null;
      viBody.innerHTML = '<div class="empty-hint">Bắt đầu ghi để thấy transcript…</div>';
      enBody.innerHTML = '<div class="empty-hint">Bản dịch sẽ xuất hiện ở đây…</div>';
    }
  };

  ws.onclose = () => {
    setStatus("", "Đã ngắt kết nối");
    setUI(false, false);
    stopMic();
    ws = null;
  };

  ws.onerror = () => setStatus("error", "Lỗi kết nối");
}

function disconnect() { ws?.close(); }

// ── Audio ─────────────────────────────────────────────────────────────────
async function startMic() {
  if (!navigator.mediaDevices) {
    setStatus("error", "Trình duyệt chặn mic — cần HTTPS hoặc mở file:// trực tiếp");
    return;
  }
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    audioCtx   = new AudioContext({ sampleRate: TARGET_SR });
    await audioCtx.audioWorklet.addModule("audio-worklet.js");

    sourceNode = audioCtx.createMediaStreamSource(micStream);

    analyserNode = audioCtx.createAnalyser();
    analyserNode.fftSize = 256;
    sourceNode.connect(analyserNode);

    workletNode = new AudioWorkletNode(audioCtx, "pcm-capture-processor");
    workletNode.port.onmessage = (e) => {
      if (ws?.readyState !== WebSocket.OPEN) return;
      ws.send(e.data.buffer);
    };
    sourceNode.connect(workletNode);

    setStatus("listening", "Đang ghi âm…");
    setUI(true, true);
    drawViz();
  } catch (err) {
    setStatus("error", "Lỗi mic: " + err.message);
  }
}

function stopMic() {
  cancelAnimationFrame(animId);
  workletNode?.disconnect(); workletNode = null;
  sourceNode?.disconnect();  sourceNode = null;
  analyserNode = null;
  audioCtx?.close();         audioCtx = null;
  micStream?.getTracks().forEach(t => t.stop()); micStream = null;
  ctx2d.clearRect(0, 0, canvas.width, canvas.height);
  if (ws?.readyState === WebSocket.OPEN) {
    setStatus("connected", "Đã dừng · sẵn sàng ghi lại");
    setUI(true, false);
  }
}

// ── Visualizer ────────────────────────────────────────────────────────────
// FIX 2: Use ResizeObserver to sync canvas pixel dimensions with CSS layout size.
// offsetWidth/Height returns 0 when called before first paint; ResizeObserver
// fires after layout is complete and again on every resize.
const resizeObserver = new ResizeObserver(entries => {
  for (const entry of entries) {
    canvas.width  = entry.contentRect.width;
    canvas.height = entry.contentRect.height;
  }
});
resizeObserver.observe(canvas);

function drawViz() {
  const buf = new Uint8Array(analyserNode.frequencyBinCount);

  function frame() {
    animId = requestAnimationFrame(frame);
    if (!analyserNode) return;
    analyserNode.getByteTimeDomainData(buf);

    // canvas.width/height are now always correct thanks to ResizeObserver
    ctx2d.clearRect(0, 0, canvas.width, canvas.height);
    ctx2d.strokeStyle = "#6366f1";
    ctx2d.lineWidth = 1.5;
    ctx2d.beginPath();
    const step = canvas.width / buf.length;
    buf.forEach((v, i) => {
      const y = (v / 128) * (canvas.height / 2);
      i === 0 ? ctx2d.moveTo(0, y) : ctx2d.lineTo(i * step, y);
    });
    ctx2d.stroke();
  }
  frame();
}

// ── Reset ─────────────────────────────────────────────────────────────────
function resetSession() {
  statSegs = statChunks = statWaits = 0;
  updateStats();
  viNode = null;
  enNode = null;
  viBody.innerHTML = '<div class="empty-hint">Bắt đầu ghi để thấy transcript…</div>';
  enBody.innerHTML = '<div class="empty-hint">Bản dịch sẽ xuất hiện ở đây…</div>';
  if (ws?.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: "reset" }));
  }
}

// ── VAD Config Panel — gửi config_update, backend apply runtime không restart ──
function applyVadConfig() {
  if (ws?.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({
    type: "config_update",
    vad: {
      threshold: parseFloat(vadThreshold.value),
      min_silence_ms: parseInt(vadMinSilence.value, 10),
      min_speech_ms: parseInt(vadMinSpeech.value, 10),
    },
  }));
}

// ── Events ────────────────────────────────────────────────────────────────
btnConn.addEventListener("click", connect);
btnDisc.addEventListener("click", disconnect);
btnStart.addEventListener("click", startMic);
btnStop.addEventListener("click", stopMic);
btnReset.addEventListener("click", resetSession);
btnVadApply.addEventListener("click", applyVadConfig);
wsUrlInput.addEventListener("keydown", e => { if (e.key === "Enter") connect(); });
</script>
</body>
</html>
