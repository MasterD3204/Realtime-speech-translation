asr:
  provider: sherpa_onnx
  model_dir: ./sherpa-onnx-zipformer-vi-30M-int8-2026-02-09
  language: vi
  num_threads: 4
  decode_hop_ms: 960
  local_agreement_n: 3

llm:
  provider: openai
  model: misa-ai-1.1-mini
  base_url: https://ai.misa.vn/nlp/llm-gateway/v1
  api_key:
  temperature: 0.1
  max_tokens: 256

vad:
  model_path: ./silero_vad.onnx
  threshold: 0.6
  min_silence_ms: 400
  min_speech_ms: 200

translation:
  source_lang: vi
  target_lang: en
  frozen_context_window: 3
